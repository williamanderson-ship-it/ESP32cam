<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Jumbo Lost & Found</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #111;
            color: white;
            padding: 40px 20px;
        }
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        header h1 {
            font-size: 2.5rem;
            color: #3b82f6;
            margin-bottom: 10px;
        }
        header p {
            color: #888;
            font-size: 1rem;
            margin-bottom: 24px;
        }
        .search-box {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .search-box input {
            width: 400px;
            padding: 12px 18px;
            border-radius: 8px;
            border: 2px solid #333;
            background: #222;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: border 0.2s;
        }
        .search-box input:focus { border-color: #3b82f6; }
        .search-box button {
            padding: 12px 24px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
        }
        .search-box button:hover { background: #2563eb; }
        #status {
            text-align: center;
            color: #888;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        .items {
            max-width: 700px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .item {
            background: #222;
            border-radius: 10px;
            padding: 15px;
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }
        .item img {
            width: 200px;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
            flex-shrink: 0;
        }
        .item-info { flex: 1; }
        .description {
            font-size: 1rem;
            line-height: 1.6;
            color: #ddd;
        }
        .time {
            color: #888;
            font-size: 0.75rem;
            margin-top: 8px;
        }
        .claim-btn {
            margin-top: 14px;
            padding: 8px 20px;
            background: #22c55e;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
        }
        .claim-btn:hover { background: #16a34a; }
        .claim-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .no-results {
            text-align: center;
            color: #888;
            margin-top: 60px;
            font-size: 1.1rem;
        }
        mark {
            background: #3b82f6;
            color: black;
            border-radius: 3px;
            padding: 0 2px;
        }
    </style>
</head>
<body>
    <header>
        <h1>🐘 Jumbo Lost &amp; Found 🐘</h1>
        <p>Type what you lost and we'll find it for you</p>
        <div class="search-box">
            <input type="text" id="search" placeholder="e.g. keys, water bottle, jacket..." />
            <button onclick="doSearch()">Search</button>
        </div>
        <div id="status"></div>
    </header>
    <div class="items" id="items"></div>

    <script>
        function formatTime(iso) {
            const d = new Date(iso + 'Z');
            if (!iso) return 'Unknown date';
const d = new Date(iso.endsWith('Z') ? iso : iso + 'Z');
if (isNaN(d.getTime())) return 'Unknown date';
return d.toLocaleString('en-US', { timeZone: 'America/New_York', dateStyle: 'medium', timeStyle: 'short' });
        }

        function highlight(text, query) {
            if (!query) return text;
            const words = query.trim().split(/\s+/);
            let result = text;
            words.forEach(word => {
                if (word.length < 2) return;
                const re = new RegExp('(' + word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
                result = result.replace(re, '<mark>$1</mark>');
            });
            return result;
        }

        async function claimItem(id, itemEl, btn) {
            btn.disabled = true;
            btn.textContent = 'Claiming...';
            try {
                const res = await fetch(`/claim/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    itemEl.style.transition = 'opacity 0.3s';
                    itemEl.style.opacity = '0';
                    setTimeout(() => itemEl.remove(), 300);
                } else {
                    btn.disabled = false;
                    btn.textContent = '✓ Claim';
                    alert('Failed to claim item.');
                }
            } catch (e) {
                btn.disabled = false;
                btn.textContent = '✓ Claim';
                alert('Error claiming item.');
            }
        }

        async function doSearch() {
            const query = document.getElementById('search').value.trim();
            const container = document.getElementById('items');
            const status = document.getElementById('status');

            if (!query) {
                container.innerHTML = '';
                status.textContent = '';
                return;
            }

            status.textContent = 'Searching...';

            try {
                const res = await fetch(`/search?q=${encodeURIComponent(query)}`);
                const data = await res.json();

                if (!data.length) {
                    container.innerHTML = `<div class="no-results">No items found matching "${query}"</div>`;
                    status.textContent = '0 results';
                    return;
                }

                status.textContent = `${data.length} item(s) found`;
                container.innerHTML = '';

                data.forEach(item => {
                    const el = document.createElement('div');
                    el.className = 'item';
                    el.innerHTML = `
                        <img src="${item.url}" alt="lost item" />
                        <div class="item-info">
                            <div class="description">${highlight(item.description, query)}</div>
                            <div class="time">🕐 Handed in: ${formatTime(item.created_at)}</div>
                            <div class="time">📍 Location: NOLOP</div>
                            <button class="claim-btn">✓ Claim</button>
                        </div>
                    `;
                    const btn = el.querySelector('.claim-btn');
                    btn.addEventListener('click', () => claimItem(item.id, el, btn));
                    container.appendChild(el);
                });

            } catch (e) {
                status.textContent = 'Error loading results.';
            }
        }

        document.getElementById('search').addEventListener('keydown', e => {
            if (e.key === 'Enter') doSearch();
        });
    </script>
</body>
</html>
